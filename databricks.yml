bundle:
  name: e2e-data-project

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405606116379009.9.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: development_catalog
      schema_name: development_schema
      environment: dev
    # Override permissions for dev environment
    resources:
      jobs:
        data_ingestion_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"
            - level: "CAN_MANAGE_RUN"
              group_name: "jd-developers"
        model_training_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"
            - level: "CAN_MANAGE_RUN"
              group_name: "jd-developers"
        model_deployment_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"
            - level: "CAN_MANAGE_RUN"
              group_name: "jd-developers"
        batch_inference_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"
            - level: "CAN_MANAGE_RUN"
              group_name: "jd-developers"

  prod:
    mode: production
    workspace:
      host: https://adb-7405606653490162.2.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: production_catalog
      schema_name: production_schema
      environment: prod
    
    # Override permissions for prod environment (only PowerUsers group)
    resources:
      jobs:
        data_ingestion_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"
        model_training_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"
        model_deployment_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"
        batch_inference_job:
          permissions:
            - level: "CAN_MANAGE"
              group_name: "jd-power_users"

variables:
  catalog_name:
    description: "Name of the Unity Catalog to use"
    default: "default_catalog"
  schema_name:
    description: "Name of the schema to use"
    default: "default_schema"
  environment:
    description: "Environment name (dev/prod)"
    default: "dev"